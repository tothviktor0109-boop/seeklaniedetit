<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Klani E Detit | HQ</title>
    <style>
        :root {
            --bg: #040911; --card-bg: #0b1526; --primary: #00f2fe;
            --primary-dim: rgba(0, 242, 254, 0.1); --primary-border: rgba(0, 242, 254, 0.3);
            --text: #e2e8f0; --text-muted: #64748b; --danger: #ff0055;
            --success: #00ff88; --panel-border: 1px solid var(--primary-border);
        }
        body { font-family: 'Oxanium', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--card-bg); border: var(--panel-border); padding: 2rem; margin-bottom: 2rem; }
        .section { display: none; } .active { display: block; }
        header { background: rgba(11, 21, 38, 0.9); padding: 1rem 2rem; border-bottom: var(--panel-border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav { display: flex; justify-content: center; background: rgba(4, 9, 17, 0.8); padding: 0.5rem; gap: 5px; border-bottom: var(--panel-border); }
        .nav-btn { background: transparent; color: var(--text-muted); border: 1px solid transparent; padding: 0.5rem 1.2rem; cursor: pointer; text-transform: uppercase; font-weight: 700; }
        .nav-btn.active-nav { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
        .btn { border: 1px solid var(--primary); padding: 0.8rem 1.8rem; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--primary); font-weight: 800; }
        .btn:hover { background: var(--primary); color: var(--bg); box-shadow: 0 0 15px var(--primary); }
        input, textarea, select { padding: 0.8rem 1rem; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--primary-border); width: 100%; margin-bottom: 1rem; font-family: 'Oxanium'; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 500px; background: var(--card-bg); border: 2px solid var(--primary); padding: 2rem; }
        .auth-screen { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: var(--bg); position: fixed; top:0; left:0; z-index: 1000; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 1rem; color: var(--primary); border-bottom: 2px solid var(--primary-border); font-size: 0.8rem; }
        td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="auth-screen active">
        <div class="card" style="width: 350px; text-align: center; border: 2px solid var(--primary);">
            <h2 style="color: var(--primary);">Klani E Detit</h2>
            <input type="text" id="login-user" placeholder="NÉV">
            <input type="password" id="login-pass" placeholder="KÓD">
            <button class="btn" style="width: 100%;" onclick="bejelentkezes()">Terminal Belépés</button>
            <p id="login-hiba" style="color: var(--danger); margin-top: 1rem;"></p>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <header>
            <h1 style="color: var(--primary); font-size: 1.2rem;">KLANI E DETIT | HQ</h1>
            <div><span id="logged-in-user"></span> <button onclick="kijelentkezes()" style="color:var(--danger); background:none; border:none; cursor:pointer;">[ LOGOUT ]</button></div>
        </header>

        <nav>
            <button class="nav-btn active-nav" onclick="tab('hirek-section', this)">Közlemények</button>
            <button class="nav-btn" onclick="tab('kassza-section', this)">Kassza</button>
            <button class="nav-btn" onclick="tab('tagok-section', this)">Legénység</button>
            <button class="nav-btn" onclick="tab('profil-section', this)">Profil</button>
        </nav>

        <div class="container">
            <div id="password-screen" class="section card">
                <h2>Üdvözlünk! Válts jelszót:</h2>
                <input type="password" id="new-pass" placeholder="Új biztonsági kód">
                <button class="btn" onclick="jelszocsere()">Mentés és Belépés</button>
            </div>

            <div id="hirek-section" class="section active">
                <div id="uj-hir-doboz" class="card">
                    <h3>Új bejegyzés</h3>
                    <input type="text" id="hir-cim" placeholder="Cím">
                    <textarea id="hir-tartalom" rows="3" placeholder="Tartalom..."></textarea>
                    <button class="btn" onclick="posztolHir()">Küldés</button>
                </div>
                <div id="hirek-lista"></div>
            </div>

            <div id="kassza-section" class="section">
                <div class="card" style="text-align: center;">
                    <h1 id="balanceDisplay" style="font-size: 3rem; color: var(--success);">0 $</h1>
                    <input type="text" id="osszeg" placeholder="Összeg" style="width: 200px;" oninput="formatNumber(this)">
                    <button class="btn" onclick="inditTranzakcio('be')">Befizetés</button>
                    <button class="btn" style="color:var(--danger); border-color:var(--danger);" onclick="inditTranzakcio('ki')">Kivétel</button>
                </div>
                <div class="card">
                    <table><thead><tr><th>Dátum</th><th>Tag</th><th>Típus</th><th>Összeg</th><th>Igazolás</th></tr></thead><tbody id="kassza-log-lista"></tbody></table>
                </div>
            </div>

            <div id="tagok-section" class="section">
                <div class="card"><table><thead><tr><th>Név</th><th>Rang</th><th>Művelet</th></tr></thead><tbody id="tagok-lista"></tbody></table></div>
            </div>

            <div id="profil-section" class="section">
                <div class="card"><h2 id="display-nev"></h2><p id="display-rang"></p><textarea id="input-bemutatkozas" rows="5"></textarea><button class="btn" onclick="mentesProfil()">Mentés</button></div>
            </div>
        </div>
    </div>

    <div id="kassza-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-osszeg-display"></h2>
            <select id="igazolas-tipus" onchange="valtsIgazolasTipus(this.value)">
                <option value="link">Kép Link (Imgur/Discord)</option>
                <option value="szoveg">Szöveges megjegyzés</option>
            </select>
            <div id="igazolas-input-container">
                <input type="text" id="kassza-bizonyitek" placeholder="https://...">
            </div>
            <button class="btn" onclick="veglegesitTranzakcio()">Megerősítés</button>
            <button class="btn" style="border:none;" onclick="zárKasszaModal()">Mégse</button>
        </div>
    </div>

    <script>
        let myUserId, myUserName, myUserRang, aktualisTranzakcio = null;

        async function apiFetch(url, options = {}) {
            const token = localStorage.getItem('klani_token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            options.headers = headers;
            return fetch(url, options);
        }

        async function bejelentkezes() {
            const nev = document.getElementById('login-user').value;
            const jelszo = document.getElementById('login-pass').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({nev, jelszo}) });
            const data = await res.json();
            if (data.success) {
                if (data.elso_belepes) {
                    window.tempId = data.user.id;
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('main-app').style.display='block';
                    tab('password-screen', null);
                } else {
                    localStorage.setItem('klani_token', data.token);
                    location.reload();
                }
            } else document.getElementById('login-hiba').innerText = data.error;
        }

        async function jelszocsere() {
            const ujJelszo = document.getElementById('new-pass').value;
            await apiFetch('/api/jelszocsere', { method:'POST', body:JSON.stringify({userId:window.tempId, ujJelszo}) });
            alert("Kész!"); location.reload();
        }

        function tab(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav')); btn.classList.add('active-nav'); }
        }

        window.onload = async () => {
            const token = localStorage.getItem('klani_token');
            if (token) {
                const decoded = JSON.parse(atob(token.split('.')[1]));
                myUserId = decoded.id; myUserName = decoded.nev; myUserRang = decoded.rang;
                document.getElementById('logged-in-user').innerText = myUserName;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                fetchHirek(); fetchBalance(); fetchTagok(); fetchProfil();
            }
        };

        // KASSZA LOGIKA
        function inditTranzakcio(tipus) {
            const osszeg = parseInt(document.getElementById('osszeg').value.replace(/\s/g, ""));
            if (!osszeg) return alert("Összeg?");
            aktualisTranzakcio = { tipus, osszeg };
            document.getElementById('modal-osszeg-display').innerText = (tipus==='be'?'Befizetés: ':'Kivétel: ') + osszeg + " $";
            document.getElementById('kassza-modal').style.display = 'flex';
        }

        function valtsIgazolasTipus(v) {
            const c = document.getElementById('igazolas-input-container');
            c.innerHTML = v === 'link' ? '<input type="text" id="kassza-bizonyitek" placeholder="https://...">' : '<textarea id="kassza-bizonyitek" placeholder="Megjegyzés..."></textarea>';
        }

        async function veglegesitTranzakcio() {
            const b = document.getElementById('kassza-bizonyitek').value;
            await apiFetch('/api/kassza', { method:'POST', body:JSON.stringify({...aktualisTranzakcio, bizonyitek:b, operator:myUserName}) });
            location.reload();
        }

        function zárKasszaModal() { document.getElementById('kassza-modal').style.display='none'; }
        function formatNumber(i) { i.value = i.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
        function kijelentkezes() { localStorage.removeItem('klani_token'); location.reload(); }

        async function fetchHirek() { 
            const res = await apiFetch('/api/hirek'); const h = await res.json();
            const l = document.getElementById('hirek-lista'); l.innerHTML = '';
            h.forEach(x => { l.innerHTML += `<div class="card"><strong>${x.cim}</strong><br><small>${x.iro} • ${new Date(x.datum).toLocaleString()}</small><p>${x.tartalom}</p></div>`; });
        }

        async function posztolHir() {
            const cim = document.getElementById('hir-cim').value, tartalom = document.getElementById('hir-tartalom').value;
            await apiFetch('/api/hirek', { method:'POST', body:JSON.stringify({cim, tartalom}) });
            location.reload();
        }

        async function fetchBalance() {
            const res = await apiFetch('/api/kassza'); const d = await res.json();
            document.getElementById('balanceDisplay').innerText = d.balance.toLocaleString() + ' $';
            const tbody = document.getElementById('kassza-log-lista'); tbody.innerHTML = '';
            d.logs.forEach(log => {
                const isLink = log.bizonyitek?.startsWith('http');
                const ig = isLink ? `<a href="${log.bizonyitek}" target="_blank" style="color:var(--primary)">LINK</a>` : (log.bizonyitek || '-');
                tbody.innerHTML += `<tr><td>${new Date(log.datum).toLocaleDateString()}</td><td>${log.operator}</td><td style="color:${log.tipus==='be'?'var(--success)':'var(--danger)'}">${log.tipus.toUpperCase()}</td><td>${log.osszeg.toLocaleString()} $</td><td>${ig}</td></tr>`;
            });
        }

        async function fetchTagok() {
            const res = await apiFetch('/api/tagok'); const t = await res.json();
            const tbody = document.getElementById('tagok-lista'); tbody.innerHTML = '';
            t.forEach(x => { tbody.innerHTML += `<tr><td>${x.nev}</td><td>${x.rang}</td><td><button class="btn" style="padding:2px 10px;">Info</button></td></tr>`; });
        }

        async function fetchProfil() {
            const res = await apiFetch(`/api/profil/${myUserId}`); const p = await res.json();
            document.getElementById('display-nev').innerText = p.nev;
            document.getElementById('display-rang').innerText = p.rang;
            document.getElementById('input-bemutatkozas').value = p.bemutatkozas || '';
        }

        async function mentesProfil() {
            const b = document.getElementById('input-bemutatkozas').value;
            await apiFetch(`/api/profil/${myUserId}`, { method:'PUT', body:JSON.stringify({bemutatkozas:b}) });
            alert("Mentve!");
        }
    </script>
</body>
</html>
